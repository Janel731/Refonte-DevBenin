    <meta charset="UTF-8" />
    <style>
      body {
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        background: #f5f5f5;
        margin: 0;
      }

      .container {
        width: 700px;
        height: 700px;
        position: relative;
      }

      svg {
        width: 100%;
        height: 100%;
        overflow: visible;
      }

      /* --- ANIMATIONS DES BLOCS ICÔNES --- */

      /* Chaque icône flotte avec un décalage différent */
      .float-1 {
        animation: floatIcon 4s ease-in-out infinite;
      }
      .float-2 {
        animation: floatIcon 4s ease-in-out infinite 1s;
      }
      .float-3 {
        animation: floatIcon 4s ease-in-out infinite 2s;
      }
      .float-4 {
        animation: floatIcon 4s ease-in-out infinite 3s;
      }

      @keyframes floatIcon {
        0%,
        100% {
          transform: translateY(0px);
        }
        50% {
          transform: translateY(-15px);
        }
      }

      /* Effet de survol : l'icône grossit */
      .icon-group:hover {
        transform: scale(1.15) !important;
        filter: drop-shadow(0 10px 20px rgba(0, 0, 0, 0.2));
        transition: all 0.3s ease;
        cursor: pointer;
      }

      /* Ajout d'un effet "glow" subtil au survol */
      .icon-group:hover rect {
        stroke: white;
        stroke-width: 2;
      }

      /* --- ANIMATION D'APPARITION --- */
      .icon-group {
        opacity: 0;
        animation: fadeInUp 0.8s ease forwards;
      }
      .icon-group:nth-child(1) {
        animation-delay: 0.2s;
      }
      .icon-group:nth-child(2) {
        animation-delay: 0.4s;
      }
      .icon-group:nth-child(3) {
        animation-delay: 0.6s;
      }
      .icon-group:nth-child(4) {
        animation-delay: 0.8s;
      }

      @keyframes fadeInUp {
        0% {
          opacity: 0;
          transform: translateY(20px);
        }
        100% {
          opacity: 1;
          transform: translateY(0);
        }
      }
    </style>
  </head>
